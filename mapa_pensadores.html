<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Mundi dos Pensadores — História da Psicologia Moderna</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #08080c;
  --surface: #101018;
  --surface2: #16161f;
  --border: #1e1e2e;
  --text: #e8e5dc;
  --text-dim: #706c78;
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.12);
  --gold-glow: rgba(201,168,76,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  padding: 20px 32px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
  z-index: 1000;
}

.header-top {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-back:hover {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
}

.btn-back:hover svg { transform: translateX(-3px); }
.btn-back svg { transition: transform 0.2s; }

.header-title h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--gold);
  line-height: 1.2;
}

.header-title p {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 300;
  margin-top: 2px;
}

/* ── Controls ── */
.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 500;
  white-space: nowrap;
}

.filter-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 12px;
  border-radius: 16px;
  font-size: 11px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.filter-btn:hover, .filter-btn.active {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
}

.sep {
  width: 1px;
  height: 20px;
  background: var(--border);
}

.period-range {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-dim);
}

.period-range input[type=range] {
  -webkit-appearance: none;
  width: 120px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

.period-range input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
}

.period-val {
  color: var(--gold);
  font-weight: 600;
  min-width: 36px;
  text-align: center;
}

.stats-pill {
  margin-left: auto;
  background: var(--gold-dim);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}

/* ── Map ── */
#map {
  flex: 1;
  z-index: 1;
}

/* Leaflet dark overrides */
.leaflet-container {
  background: #0d0d14 !important;
}

.leaflet-tile {
  filter: brightness(0.55) saturate(0.4) hue-rotate(200deg);
}

/* ── Custom Popups ── */
.leaflet-popup-content-wrapper {
  background: var(--surface2) !important;
  border: 1px solid var(--border) !important;
  border-radius: 12px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
  padding: 0 !important;
}

.leaflet-popup-tip {
  background: var(--surface2) !important;
}

.leaflet-popup-content {
  margin: 0 !important;
  min-width: 220px;
}

.popup-inner {
  padding: 14px 16px;
}

.popup-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 4px;
}

.popup-dates {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.popup-cat {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.popup-locations {
  font-size: 12px;
  color: var(--text);
  line-height: 1.6;
}

.popup-loc-item {
  display: flex;
  gap: 6px;
  align-items: flex-start;
  margin-bottom: 4px;
}

.popup-loc-type {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  padding-top: 1px;
  min-width: 60px;
}

.popup-loc-name {
  color: var(--text);
  font-size: 12px;
}

/* ── Legend ── */
.map-legend {
  position: absolute;
  bottom: 24px;
  right: 12px;
  z-index: 1000;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 11px;
}

.legend-title {
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 10px;
  margin-bottom: 8px;
  font-weight: 500;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
  color: var(--text-dim);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-ring {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid;
  flex-shrink: 0;
  background: transparent;
}

/* ── Mode toggle ── */
.mode-info {
  font-size: 11px;
  color: var(--text-dim);
  padding: 4px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.mode-info span {
  color: var(--gold);
  font-weight: 500;
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <a class="btn-back" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Voltar
    </a>
    <div class="header-title">
      <h1>Mapa Mundi dos Pensadores</h1>
      <p>Geolocalização de nascimento e locais de atuação — Schultz & Schultz</p>
    </div>
  </div>

  <div class="controls">
    <div class="filter-group">
      <span class="filter-label">Visualizar:</span>
      <button class="filter-btn active" id="btnNasc" onclick="setMode('nascimento')">Nascimento</button>
      <button class="filter-btn" id="btnAtua" onclick="setMode('atuacao')">Atuação</button>
      <button class="filter-btn" id="btnAmbos" onclick="setMode('ambos')">Ambos</button>
    </div>

    <div class="sep"></div>

    <div class="filter-group">
      <span class="filter-label">Categoria:</span>
      <button class="filter-btn active" data-cat="all" onclick="setCat(this,'all')">Todos</button>
      <button class="filter-btn" data-cat="psicologo" onclick="setCat(this,'psicologo')">Psicólogo</button>
      <button class="filter-btn" data-cat="filosofo" onclick="setCat(this,'filosofo')">Filósofo</button>
      <button class="filter-btn" data-cat="fisiologo" onclick="setCat(this,'fisiologo')">Fisiologista</button>
      <button class="filter-btn" data-cat="medico" onclick="setCat(this,'medico')">Médico</button>
      <button class="filter-btn" data-cat="matematico" onclick="setCat(this,'matematico')">Matemático</button>
      <button class="filter-btn" data-cat="naturalista" onclick="setCat(this,'naturalista')">Naturalista</button>
    </div>

    <div class="sep"></div>

    <div class="filter-group period-range">
      <span class="filter-label">Período:</span>
      <input type="range" id="periodStart" min="1450" max="1950" value="1450" step="25" oninput="updatePeriod()">
      <span class="period-val" id="valStart">1450</span>
      <span style="color:var(--border)">—</span>
      <input type="range" id="periodEnd" min="1500" max="2030" value="2030" step="25" oninput="updatePeriod()">
      <span class="period-val" id="valEnd">2030</span>
    </div>

    <div class="stats-pill" id="statsPill">111 pensadores</div>
  </div>
</header>

<div id="map"></div>

<div class="map-legend">
  <div class="legend-title">Legenda</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c9a84c"></div> Nascimento</div>
  <div class="legend-item"><div class="legend-ring" style="border-color:#6366f1"></div> Atuação / Trabalho</div>
  <div class="legend-item" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px;">
    <div class="legend-dot" style="background:#22c55e"></div> Psicólogo
  </div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div> Filósofo</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div> Fisiologista</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f43f5e"></div> Médico</div>
  <div class="legend-item"><div class="legend-dot" style="background:#38bdf8"></div> Matemático</div>
  <div class="legend-item"><div class="legend-dot" style="background:#84cc16"></div> Naturalista</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fb923c"></div> Sociólogo</div>
</div>

// ═══════════════════════════════════════════════════════════════
// CORES POR CATEGORIA
// ═══════════════════════════════════════════════════════════════
const CAT_COLORS = {
  psicologo:  '#22c55e',
  filosofo:   '#a78bfa',
  fisiologo:  '#f97316',
  medico:     '#f43f5e',
  matematico: '#38bdf8',
  naturalista:'#84cc16',
  sociologo:  '#fb923c',
};

const CAT_LABELS = {
  psicologo:  'Psicólogo',
  filosofo:   'Filósofo',
  fisiologo:  'Fisiologista',
  medico:     'Médico',
  matematico: 'Matemático/Físico',
  naturalista:'Naturalista',
  sociologo:  'Sociólogo',
};

// ═══════════════════════════════════════════════════════════════
// MAPA
// ═══════════════════════════════════════════════════════════════
const map = L.map('map', {
  center: [30, 10],
  zoom: 3,
  minZoom: 2,
  maxZoom: 10,
  zoomControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

// ── State ──
let currentMode = 'nascimento';
let currentCat  = 'all';
let periodStart = 1450;
let periodEnd   = 2030;
let markers     = [];

// ── Create custom icon ──
function makeIcon(color, isWork = false) {
  const size = isWork ? 10 : 12;
  const svg = isWork
    ? `<svg xmlns="http://www.w3.org/2000/svg" width="${size*2}" height="${size*2}" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="${color}" stroke-width="2.5"/><circle cx="12" cy="12" r="3" fill="${color}"/></svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" width="${size*2}" height="${size*2}" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="${color}" fill-opacity="0.85"/><circle cx="12" cy="12" r="5" fill="white" fill-opacity="0.4"/></svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [size*2, size*2],
    iconAnchor: [size, size],
    popupAnchor: [0, -size],
  });
}

// ── Build popup ──
function buildPopup(t, showBorn, showWork) {
  const color = CAT_COLORS[t.cat] || '#c9a84c';
  let locs = '';
  if (showBorn) {
    locs += `<div class="popup-loc-item"><span class="popup-loc-type">Nascimento</span><span class="popup-loc-name">${t.born.city}</span></div>`;
  }
  if (showWork && t.worked) {
    t.worked.forEach(w => {
      locs += `<div class="popup-loc-item"><span class="popup-loc-type">${w.from}–${w.to}</span><span class="popup-loc-name">${w.place}<br><span style="color:var(--text-dim);font-size:11px">${w.city}</span></span></div>`;
    });
  }
  return `<div class="popup-inner">
    <div class="popup-name">${t.name}</div>
    <div class="popup-dates">${t.birth} – ${t.death}</div>
    <div class="popup-cat" style="background:${color}22;color:${color};border:1px solid ${color}44">${CAT_LABELS[t.cat]}</div>
    <div class="popup-locations">${locs}</div>
  </div>`;
}

// ── Render markers ──
function renderMarkers() {
  // Clear existing
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  let count = 0;

  THINKERS.forEach(t => {
    // Category filter
    if (currentCat !== 'all' && t.cat !== currentCat) return;

    // Period filter — pensador deve ter vivido no período selecionado
    if (t.death < periodStart || t.birth > periodEnd) return;

    const color = CAT_COLORS[t.cat] || '#c9a84c';
    const showBorn = currentMode === 'nascimento' || currentMode === 'ambos';
    const showWork = currentMode === 'atuacao'    || currentMode === 'ambos';

    // Birth marker
    if (showBorn) {
      const m = L.marker([t.born.lat, t.born.lng], { icon: makeIcon(color, false) })
        .bindPopup(buildPopup(t, true, false), { maxWidth: 280 });
      m.addTo(map);
      markers.push(m);
      count++;
    }

    // Work markers
    if (showWork && t.worked) {
      t.worked.forEach(w => {
        // Filter by period overlap
        if (w.to < periodStart || w.from > periodEnd) return;

        const wm = L.marker([w.lat, w.lng], { icon: makeIcon(color, true) })
          .bindPopup(buildPopup(t, false, true), { maxWidth: 280 });
        wm.addTo(map);
        markers.push(wm);
        count++;
      });
    }
  });

  // Update stats
  const unique = new Set();
  THINKERS.forEach(t => {
    if (currentCat !== 'all' && t.cat !== currentCat) return;
    if (t.death < periodStart || t.birth > periodEnd) return;
    unique.add(t.name);
  });
  document.getElementById('statsPill').textContent = `${unique.size} pensador${unique.size !== 1 ? 'es' : ''}`;
}

// ── Controls ──
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnNasc').classList.toggle('active', mode === 'nascimento');
  document.getElementById('btnAtua').classList.toggle('active', mode === 'atuacao');
  document.getElementById('btnAmbos').classList.toggle('active', mode === 'ambos');
  renderMarkers();
}

function setCat(btn, cat) {
  currentCat = cat;
  document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMarkers();
}

function updatePeriod() {
  periodStart = parseInt(document.getElementById('periodStart').value);
  periodEnd   = parseInt(document.getElementById('periodEnd').value);
  // Ensure start <= end
  if (periodStart > periodEnd) {
    periodEnd = periodStart;
    document.getElementById('periodEnd').value = periodEnd;
  }
  document.getElementById('valStart').textContent = periodStart;
  document.getElementById('valEnd').textContent   = periodEnd;
  renderMarkers();
}

// ── Init ──
renderMarkers();
</script>
