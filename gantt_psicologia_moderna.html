<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linha do Tempo — História da Psicologia Moderna</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2a;
    --text: #e8e6e0;
    --text-dim: #8a8690;
    --accent: #c9a84c;
    --accent-dim: rgba(201,168,76,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 36px 40px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    z-index: 100;
  }

  .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }

  .btn-back:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-back svg {
    transition: transform 0.2s;
  }

  .btn-back:hover svg {
    transform: translateX(-3px);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  header p {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    font-weight: 300;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .controls button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .controls button:hover, .controls button.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .chart-container {
    padding: 0 40px 0;
    overflow-x: auto;
    overflow-y: hidden;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .timeline-header {
    display: flex;
    align-items: flex-end;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 0 10px;
    margin-bottom: 0;
    min-width: fit-content;
    height: 50px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .label-col {
    min-width: 260px;
    max-width: 260px;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding-right: 16px;
    font-weight: 500;
    display: flex;
    align-items: flex-end;
  }

  .timeline-col {
    flex: 1;
    position: relative;
    min-width: 900px;
    height: 100%;
  }

  .century-markers {
    display: flex;
    width: 100%;
    height: 20px;
  }

  .century-mark {
    font-size: 11px;
    color: var(--text-dim);
    position: absolute;
    bottom: 0;
    transform: translateX(-50%);
    letter-spacing: 1px;
    font-weight: 500;
  }

  .row {
    display: flex;
    align-items: center;
    min-height: 32px;
    border-bottom: 1px solid rgba(30,30,42,0.4);
    transition: background 0.15s;
    min-width: fit-content;
    position: relative;
  }

  .row:hover {
    background: rgba(201,168,76,0.04);
  }

  .row .name {
    min-width: 260px;
    max-width: 260px;
    flex-shrink: 0;
    font-size: 13px;
    padding-right: 16px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 400;
    color: var(--text);
  }

  .row .name .dates {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 6px;
    font-weight: 300;
  }

  .bar-area {
    flex: 1;
    position: relative;
    height: 32px;
    min-width: 900px;
  }

  .bar {
    position: absolute;
    height: 14px;
    top: 9px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0.85;
  }

  .bar:hover {
    opacity: 1;
    height: 18px;
    top: 7px;
    filter: brightness(1.2);
    box-shadow: 0 0 16px rgba(201,168,76,0.3);
  }

  .tooltip {
    position: fixed;
    background: #1a1a24;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    pointer-events: none;
    z-index: 200;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-width: 280px;
  }

  .tooltip .tt-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .tooltip .tt-dates {
    font-size: 12px;
    color: var(--text-dim);
  }

  .tooltip .tt-cat {
    font-size: 11px;
    color: var(--text);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .grid-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--border);
    opacity: 0.4;
    pointer-events: none;
  }

  .stats {
    padding: 0 40px 10px;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 300;
    flex-shrink: 0;
    background: var(--bg);
    z-index: 99;
  }

  /* Category colors */
  .cat-filosofo { background: linear-gradient(90deg, #6366f1, #818cf8); }
  .cat-fisiologo { background: linear-gradient(90deg, #14b8a6, #5eead4); }
  .cat-psicologo { background: linear-gradient(90deg, #c9a84c, #e2c97a); }
  .cat-medico { background: linear-gradient(90deg, #f43f5e, #fb7185); }
  .cat-naturalista { background: linear-gradient(90deg, #22c55e, #86efac); }
  .cat-matematico { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }
  .cat-sociologo { background: linear-gradient(90deg, #f97316, #fdba74); }
  .cat-outro { background: linear-gradient(90deg, #64748b, #94a3b8); }

  .legend {
    display: flex;
    gap: 16px;
    padding: 8px 40px 10px;
    flex-wrap: wrap;
    flex-shrink: 0;
    background: var(--bg);
    z-index: 99;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  /* Scrollable rows area */
  #rows {
    overflow-y: auto;
    overflow-x: visible;
    flex: 1;
    min-height: 0;
  }

  @media (max-width: 768px) {
    header { padding: 24px 16px 16px; }
    header h1 { font-size: 22px; }
    .chart-container { padding: 0 16px; }
    .label-col, .row .name { min-width: 180px; max-width: 180px; }
    .legend, .stats { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>

<header>

const categories = {
  filosofo: { label: "Filósofo", color: "#6366f1" },
  fisiologo: { label: "Fisiologista", color: "#14b8a6" },
  psicologo: { label: "Psicólogo", color: "#c9a84c" },
  medico: { label: "Médico / Psiquiatra", color: "#f43f5e" },
  naturalista: { label: "Naturalista", color: "#22c55e" },
  matematico: { label: "Matemático / Físico", color: "#a78bfa" },
  sociologo: { label: "Sociólogo", color: "#f97316" },
};

const MIN_YEAR = 1470;
const MAX_YEAR = 2030;
const RANGE = MAX_YEAR - MIN_YEAR;

let activeFilter = "all";

function pct(year) {
  return ((year - MIN_YEAR) / RANGE) * 100;
}

// Build legend
const legendEl = document.getElementById("legend");
Object.entries(categories).forEach(([key, val]) => {
  const item = document.createElement("div");
  item.className = "legend-item";
  item.innerHTML = `<div class="legend-dot" style="background:${val.color}"></div>${val.label}`;
  legendEl.appendChild(item);
});

// Build controls
const controlsEl = document.getElementById("controls");
const allBtn = document.createElement("button");
allBtn.textContent = "Todos";
allBtn.className = "active";
allBtn.onclick = () => { activeFilter = "all"; render(); };
controlsEl.appendChild(allBtn);

Object.entries(categories).forEach(([key, val]) => {
  const btn = document.createElement("button");
  btn.textContent = val.label;
  btn.onclick = () => { activeFilter = key; render(); };
  controlsEl.appendChild(btn);
});

// Sort buttons
const sortBirth = document.createElement("button");
sortBirth.textContent = "↑ Nascimento";
sortBirth.onclick = () => { data.sort((a,b) => a.birth - b.birth); render(); };
controlsEl.appendChild(sortBirth);

const sortCat = document.createElement("button");
sortCat.textContent = "↑ Categoria";
sortCat.onclick = () => { data.sort((a,b) => a.cat.localeCompare(b.cat) || a.birth - b.birth); render(); };
controlsEl.appendChild(sortCat);

// Timeline header
function renderHeader() {
  const header = document.getElementById("headerTimeline");
  header.innerHTML = "";
  for (let y = 1500; y <= 2025; y += 50) {
    const mark = document.createElement("div");
    mark.className = "century-mark";
    mark.style.left = pct(y) + "%";
    mark.textContent = y;
    header.appendChild(mark);
  }
}

// Tooltip
const tooltip = document.getElementById("tooltip");

function showTooltip(e, d) {
  const tt = tooltip;
  tt.querySelector(".tt-name").textContent = d.name;
  tt.querySelector(".tt-dates").textContent = `${d.birth} — ${d.death} (${d.death - d.birth} anos)`;
  tt.querySelector(".tt-cat").textContent = categories[d.cat].label;
  tt.style.display = "block";

  const rect = tt.getBoundingClientRect();
  let x = e.clientX + 16;
  let y = e.clientY - 10;
  if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - 16;
  if (y + rect.height > window.innerHeight) y = e.clientY - rect.height;
  tt.style.left = x + "px";
  tt.style.top = y + "px";
}

function hideTooltip() {
  tooltip.style.display = "none";
}

function render() {
  const filtered = activeFilter === "all" ? data : data.filter(d => d.cat === activeFilter);

  // Update button states
  controlsEl.querySelectorAll("button").forEach(btn => {
    btn.classList.remove("active");
    if (activeFilter === "all" && btn.textContent === "Todos") btn.classList.add("active");
    const catEntry = Object.entries(categories).find(([k,v]) => v.label === btn.textContent);
    if (catEntry && catEntry[0] === activeFilter) btn.classList.add("active");
  });

  document.getElementById("stats").textContent = `${filtered.length} pensadores exibidos · ${MIN_YEAR}–${MAX_YEAR}`;

  const rowsEl = document.getElementById("rows");
  rowsEl.innerHTML = "";

  filtered.forEach((d, i) => {
    const row = document.createElement("div");
    row.className = "row";
    row.style.animationDelay = (i * 10) + "ms";

    const nameDiv = document.createElement("div");
    nameDiv.className = "name";
    nameDiv.innerHTML = `${d.name}<span class="dates">${d.birth}–${d.death}</span>`;

    const barArea = document.createElement("div");
    barArea.className = "bar-area";

    // Grid lines
    for (let y = 1500; y <= 2025; y += 50) {
      const gl = document.createElement("div");
      gl.className = "grid-line";
      gl.style.left = pct(y) + "%";
      barArea.appendChild(gl);
    }

    const bar = document.createElement("div");
    bar.className = `bar cat-${d.cat}`;
    bar.style.left = pct(d.birth) + "%";
    bar.style.width = pct(d.death) - pct(d.birth) + "%";

    bar.addEventListener("mousemove", e => showTooltip(e, d));
    bar.addEventListener("mouseleave", hideTooltip);
    row.addEventListener("mousemove", e => {
      if (e.target === bar || bar.contains(e.target)) return;
    });

    barArea.appendChild(bar);
    row.appendChild(nameDiv);
    row.appendChild(barArea);
    rowsEl.appendChild(row);
  });
}

renderHeader();
data.sort((a,b) => a.birth - b.birth);
render();
</script>
</body>
</html>
